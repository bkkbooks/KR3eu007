body:
  text: 中卷續治諸症一男子遍身患小瘡或時作癢口乾作渴服消風散起赤癢益甚服遇風丹膿水淋漓飲食無度肌肉消瘦尺脈洪數左尺尤甚余謂腎水不足虛火上炎為患先用加減八味丸其渴漸止用補中益氣湯加五味子肌肉漸生佐以八珍湯加牡丹皮麥門冬百餘劑而痊二年後不節房勞其瘡復作惑於人言又服消風散之類其瘡復患余仍用前藥調治而痊一男子善怒面青腿內臁患癬類色赤作癢或為砭刺出血發熱焮腫作痛服消風散而益甚服遇仙丹愈加皮熱作渴仍服之膿水淋漓其脈洪數左關為甚余謂肝經血虛火內動復傷其血而瘡甚耳先用柴胡清肝散數劑又用四物山梔治之諸症漸愈用八珍湯地黃丸兩月餘而痊一男子面赤作渴而常患小瘡作癢服祛風藥遍身發赤癗服花蛇酒更發赤暈遍行砭刺又服消風散發熱口渴飲水不止余謂肝經血虛而風熱也用梔子清肝散及地黃丸料煎服熱渴漸止瘡漸結靨又用八珍湯地黃丸瘡靨漸脫又服月餘瘡漸愈一男面生粉刺或生小癗服消風散瘡益甚服遇仙丹加遍身赤癢仍服前藥發熱焮腫又服旬余潰而出水形體骨立先用四君當歸桔梗數劑飲食稍進又用八珍湯數劑而痊一男子患腎臟風飲燒酒發赤暈砭出血敷追毒之藥成瘡出水日晡益甚類大麻風服遇仙丹眉毛折落大便下血虛羸內熱飲食甚少勢誠可畏余先用聖濟犀角地黃湯其血漸止又用五味異功散加當歸升麻飲食漸進用四物參朮牡丹內熱漸減用易老祛風丸膿水漸少又八珍牡丹皮之類月餘瘡漸結靨因思慮發熱盜汗瘡復作癢兼起赤暈用加味歸脾湯數劑汗熱漸止用加味逍遙散六味地黃丸而痊一男子嗜膏粱炙爆醇酒辛辣之物遍身生㾦癗甚為作癢服消風散之類更起赤暈又砭出血其癢益甚敷敗毒之劑遂各成瘡膿水津淫眉毛漸脫赤癢益甚此脾經積熱傷血所致余先用犀角地黃湯諸症稍退乃用濟生犀角地黃湯加黃連治之膿水漸止乃以八珍湯加山梔牡丹皮眉毛漸生因飲食失宜胸腹作脹飲食少思或大便下血用五味異功散加升麻飲食漸進又用補中益氣湯而血止仍用異功散加當歸牡丹皮而痊一男子內臁作癢色黯搔起白皮各砭刺出血其癢益甚更起赤暈延及外臁津淫不已服祛風之藥肢體亦然作渴引飲左尺脈洪大數而無力余謂此腎經虛火復傷其血火益甚而患耳先以八珍湯加五味子牡丹皮三十餘劑諸症漸愈乃佐以加減八味丸百餘劑而痊一男子常咳嗽腿患白癜風皮膚搔起白屑服消風散之類癢益甚起赤暈各砭出血赤暈開胤而癢愈甚服遇仙丹之類成瘡出水殊類大麻風咳嗽吐痰面色皎白時或痿黃此脾肺二經虛熱之症先用五味異功散治之虛熱稍退又用地黃清肺飲肺氣漸清又用八珍湯六味丸而尋愈後又咳嗽痰喘患處作癢用參蘇飲二劑散其風邪又用五味異功散加桔梗補其肺氣而痊二年後咳嗽作渴飲水脈洪大左尺為甚用加減八味丸補腎水而痊一男子素不慎房勞其發漸落或發熱惡寒或吐痰頭暈或口乾作渴或小便如淋兩足發熱或冷至脛屬足三陰虧損而陰火內熾朝用十全大補湯夕用加減八味丸諸症退而發漸生後兩腿腕患紫癜風延於兩股作癢各砭出血癢處日甚服消風等藥患處微腫延及上體兩眼昏澀余謂腎臟風先用四生散四服後用易老祛風丸月餘用地黃丸兩月餘而痊後飲食起居失宜肢體色赤服二丸隨愈一男子患白癜風過飲或勞役患處色赤作癢服消風散之類頓起赤暈遍身皆癢砭出血服祛風藥患處出血恪服遇仙丹患處愈焮元氣日虛余先用九味蘆薈丸九味羌活湯諸症頓愈用加味逍遙散加味四物湯乃瘥一男子不時患疙瘩搔癢成瘡膿水淋漓惡寒發熱先用羌活當歸散而癢止又用易老祛風丸而不發後飲燒酒起赤暈二便不通口舌生瘡熱渴不安用防風通聖散二便便利但口乾體倦飲食不入用七味白朮散去木香四劑而安一男子患瘡疥搔破出膿水面赤作渴大便堅實脈洪數左關寸為甚此木火相搏也先用瀉青丸料煎服熱勢頓減又用梔子柴胡散加味逍遙散而瘡愈一男子患搔癢破而成瘡如大麻風服遇仙丹發熱作渴大便秘結脈沉實右關為甚此熱蓄於內也先用黃連內疏湯而大便通利又用防風通聖散去硝黃而熱渴止卻用八珍湯而瘡愈一儒者素食膏粱發熱作渴飲冷患瘡如大麻風大便出黑血服清熱祛風等寒藥益甚余謂血分有熱火也故寒之不寒用四物二連湯以清熱涼血用六味地黃丸以補腎生水而熱退又用柴胡梔子散調理而痊一男子遍身患疙瘩作癢勞而益甚用參耆歸術為君佐以柴胡炒芩桔梗川芎炙草而瘥更用補氣血之藥後不再發一男子患疙瘩搔癢發熱形氣虛弱口鼻氣熱且喜飲冷屬外邪也以消風散二劑外邪悉解但倦怠少食更治以參耆歸朮陳皮炙草五味子而健又以補中益氣湯去柴胡升麻加茯苓芍藥乃痊一男子患前症多在臀腳勞役則癢益甚小便色黃服敗毒散芩連之劑患處癢痛夜不得寐余謂脾氣下陷用補中益氣湯加五味麥門少用炒黑黃柏治之而痊凡病日間如故日晡倦怠或勞愈加晨起如故皆元氣虛也宜用前藥補而治之一儒者遍身生瘡搔癢膿水淋漓自知醫服八珍荊防之類益甚脈洪大按之無力余謂此氣血虛熱也用八珍湯加牡丹皮治之而愈繼娶後兩足生瘡久不愈尺脈數而無力余用地黃丸八珍湯而痊余甥凌雲漢年十六庚子夏作渴發熱吐痰唇燥遍身如疥兩腿尤多色黯作癢日晡愈熾仲冬腿患瘡尺脈洪數余曰疥腎疳也瘡骨疽也皆腎經虛症針之膿出其氣氤氳余謂火旺之際必變瘵症用六味地黃丸十全大補二旬諸症愈而瘵症具仍用前藥而愈抵冬畢姻至春其症復作仍服地黃丸數斤煎藥三百餘劑而愈稽勳季龍岡遍身患此腿足為甚日晡益焮口乾作渴小便頻數此腎經虛熱用補中益氣湯六味地黃丸而愈一儒者善嚏患疥余以謂腠理不密外邪所搏用補中益氣湯加白芷川芎治之不從自服荊防敗毒散盜汗發熱作渴焮痛膿水淋漓仍用前湯倍加參耆五味而痊一儒者患在臂腳日晡或癢或脹形體倦怠自服敗毒散痛處發腫小便赤澀此肺腎陰虛余用補中益氣湯加五味子麥門冬而愈一儒者遍身發癗誤服攻毒之劑元氣虛而不能愈余用補中益氣湯加茯苓治之其瘡頓愈又因調理失宜日晡益甚用八珍湯加五味子麥門冬五十餘劑而愈一男子患疙瘩色黯作癢出黑血日晡至夜益甚其腿日腫夜消余以為氣血虛而有熱朝用補中益氣湯夕用加味逍遙散而愈一男子時疫愈後遍身發癗作癢服補中益氣湯而愈有同患者不信余言乃用砭法出血而死此因陰虛血熱色黑作癢也何乃反傷陰血哉一男子患癗干癢作痛以芩連荊防山梔薄荷芍藥歸稍治之而愈一儒者應試後遍身瘙癢後成疙瘩此勞傷元氣陰火內熾秋寒收斂腠理鬱熱內作用補中益氣湯加茯苓川芎白芷而愈後復勞仍作惑於人言服祛風敗毒藥如大風之狀又發熱作渴倦怠懶食余用補中益氣湯倍加參耆歸朮半夏茯苓五味子麥門冬而愈舉人陸世明會試途中勞役胸患斑焮赤作痛頭痛發熱形倦少食大便或溏或結小便赤澀此勞傷元氣而虛火內動投補中益氣湯一劑頓退再劑而痊又數劑而元氣復一男子脾腎氣血虛熱恪服四物黃柏知母之類元氣愈虛倦熱益甚余朝用補中益氣湯夕用六味地黃丸加五味子煎服而愈後至閩為商遍身搔癢時喜熱水浴之後患瘡癗破而出水用風藥益甚或赤或白眼作花癢先用胡麻散六味丸癢漸愈用六味丸消風散瘡漸愈用八珍湯六味丸而痊次年兩股小腹頸項復作癢用四生散六味丸而愈一婦人經水先期勞役或氣惱則寒熱搔癢服祛風降火等藥不勞怒而自癢發熱更加痰喘氣促服化痰清氣之藥形氣倦怠食少胸痞身發瘡疹服消毒之類膿水淋漓服大麻風藥口乾作渴欲水而不敢飲經水又過期眉間若動又服月餘眉毛脫落經水淋漓余謂心肝二經風熱相搏制金不能平木木克脾土而不能統血肝火旺而不能藏血也眉間屬甲木而主風風動血燥而眉毛脫落又若動也經云水生木遂朝用地黃丸以滋腎水生肝血夕用加味逍遙散以清肝火生肝血月餘諸症漸愈又佐以四君芎歸牡丹皮月餘經水旬日而止又兩月餘經水五十餘日而至乃夕用五味異功散加當歸服兩月經水四十餘日而至因怒惱寒熱經水如崩眉稜覺動脈洪數弦肝脾二經為甚用柴胡梔子散二劑以平肝火用五味異功散二劑以補脾氣發熱頓退經水頓止更以八珍湯倍加參術及地黃丸兩月餘經水如期眉毛漸生因飲食停滯腹脹作痛另服祛逐之劑泄瀉不止小腹重墜飲食甚少余先用六君子湯送四神丸數劑瀉漸止飲食稍進又用補中益氣湯倍用升麻數劑重墜漸愈後因勞心發熱飲食難化嘔吐涎水其熱自臍上起覺飢熱頻作乃用六君子湯加炮姜治之熱時飲稠米湯稍安兩月餘又常服加味歸脾補中益氣二湯而痊一婦人秋間肢體作癢時發寒熱日晡熱甚口苦喜酸月水先期面色常青熱甚則赤恪服清熱涼血後發疙瘩赤癢益甚乃清熱敗毒破而膿水淋漓余謂肝脾血燥虛熱不信仍治瘡毒其瘡益甚形氣倦怠飲食減少余先用補中益氣湯間佐以六君當歸元氣稍復乃以八珍湯倍用參術少用川芎芍藥炒黑間佐以補中益氣湯諸症漸愈又以四君子湯為主佐以加味逍遙散兩月餘膿水漸少又服月餘瘡漸結靨因怒惱寒熱腹脹飲食少思患處復甚用六君子湯加山梔柴胡乃用四君子湯為主而瘡漸愈又因怒月經甚多發熱作渴瘡痛出血用柴胡清肝散熱退痛止仍用四君子湯而結靨又用八珍山梔牡丹皮而瘡愈一婦人遍身搔癢膿水淋漓發熱身如蟲行月經不調先用升麻湯送瀉青丸熱癢頓退又用加味逍遙散經行如期用換肌丸而瘡愈後因怒經行不止筋骨作痛用秦艽地黃湯易老祛風丸而痊一婦人遍身患疙瘩發熱作癢內服敗毒祛風外搽攻毒追蝕各潰成瘡膿水津淫形氣消瘦飲食日減惡寒發熱作渴飲冷脈浮數按之則澀此元氣復傷也先用七味白朮散數劑其渴漸止飲食稍加乃用八珍湯加柴胡牡丹皮膿水漸干又用六君芎歸丹皮山梔瘡漸收斂仍用八珍山梔牡丹皮而瘡愈一婦人每秋間兩手心作癢搔起白皮因勞役怒惱則發寒熱遍身作癢起疙瘩或以為風症內服花蛇等藥外敷硫黃之類患處焮潰又服遇仙丹熱渴益甚月水不通余謂脾肝二經血燥生風先用加味逍遙散熱渴漸減又用八珍柴胡山梔患處少可後因怒氣發熱脅痛患處焮痛用加味逍遙散四劑而安又用四君芎歸山梔牡丹皮半載而痊一婦人因怒寒熱發赤暈服祛風之藥發疙瘩或砭出血患處焮腫發熱頭痛內服外敷俱系風藥膿水淋漓服花蛇酒之類前症益甚更加肺熱煩渴不寐脈洪大按之如無余謂血脫煩躁先用補血當歸湯稍緩用四君當歸數劑得睡但倦怠頭暈少食用補中益氣湯加蔓荊子稍可又用八珍湯少用芎芍倍用參術三十餘劑而能步履又服月餘而痊一婦人患白癜風誤以為大麻風服蛇酒等藥患處焮腫經水兩三月一行余曰此肝血傷而內風也誤用風藥必筋脈拘急不信仍作風治果身起白屑四肢拳攣始信余言先用八珍湯四劑又用四君子湯二劑月餘乃以四君子湯又用八珍湯二劑又月餘諸症漸退元氣漸復又以四君子湯為主以逍遙散為佐將兩月瘡靨脫又月餘而愈一婦人性急善怒月經不調內熱口苦患疙瘩作癢服敗毒之藥膿水淋漓熱渴頭暈日晡益甚用加味逍遙散漸愈後因大怒月經如湧眼赤出淚用四物湯加山梔柴胡連芩數劑而愈年餘左足臂腕起白點漸大搔起白屑內熱盜汗月經兩月餘一至每怒或惡寒頭痛或不食作嘔或胸乳作脹或腹內作痛或小便見血或小水不利或白帶下注此皆肝木製伏脾土元氣虛而變症也用補中益氣湯加炒黑山梔及加味歸脾湯間服半年而愈後每怒惱患赤暈或以風疾治之發疙瘩又服遇仙丹赤腫作癢出膿水外敷追蝕之藥寒熱作渴又服胡麻草烏之藥遍身搔癢眉毛脫落膿水淋漓咳嗽發熱月經兩月一行余用四君當歸牡丹皮月餘熱渴稍止飲食稍進又服月餘咳嗽稍可卻用八珍湯加牡丹皮二十餘劑患處漸干經水如期後因傷食作瀉不食用六君子湯飲食漸進又因怒發熱作渴患處作痛經行不止用加味逍遙散漸可仍用四君子湯而痊愈一婦人性沉靜懷抱不樂月經過期遍身作癢服祛風清火之劑搔破成瘡出水不止其癢益甚或用消風散之類眉稜跳動眉毛折落又服遇仙丹患處俱潰咳嗽發熱飲食日少月經先期余作肝脾鬱怒而血燥前藥復傷而益甚先用四君芎歸山梔牡丹皮飲食漸進服月餘而嗽止又以加味逍遙散加鉤藤鉤二十餘劑而眉不動乃去鉤藤倍加參朮當歸月餘瘡漸結靨又以八珍湯加山梔牡丹皮而痊一婦人患前症膿水淋漓發熱作渴體倦惡寒經水不調久而不愈此肝脾虧損而虛熱也先用補中益氣湯加川芎山梔而元氣漸復又用逍遙散而瘡漸愈又產後患疥遍身作癢搔起疙瘩破而出膿或出血水誤服醉仙散殊類風症余用八珍湯數劑而安又用十全大補湯患處漸干因惱怒停食腹脹少食發熱作渴患處復潰用六君子湯加炒黑山梔數劑飲食漸進又用八珍湯之類而痊一婦人日晡身癢月餘口乾又月餘成瘡服祛風治瘡之劑膿水淋漓午前畏寒午後發熱殊類風症余謂此肝火傷脾外邪所搏先用補中益氣湯加山梔鉤藤又用加味逍遙散兼八珍散而痊一婦人素清苦因鬱怒患前症遍身患疙瘩晡熱內熱自汗盜汗月經不行口乾咽燥余用歸脾湯數劑諸症稍退後兼加味逍遙散五十餘劑而愈一婦人性躁患㾦癗作癢膿水津淫寒熱口苦脅痛耳鳴腹脹溺澀乃肝脾血虛火症用六君柴胡山梔龍膽數劑以逍遙散兼服漸愈又與六味逍遙散七十餘劑諸症悉退一婦人患癍症作癢脈浮數以人參敗毒散二劑少愈更以消風散四劑而安又用柴胡清肝散而愈一婦人患癍症痛癢大便秘脈沉實以四物湯加芩連大黃槐花治之而便利用四物二連湯而瘡愈一婦人身如丹毒搔破淋漓熱渴頭眩日晡益甚用逍遙散加炒山梔陳皮而愈又用八珍柴胡山梔丹皮而愈一婦人患前症誤用大麻風藥破而出水煩渴頭暈誠類風症六脈洪數心肝脾為甚余曰風自火出此因怒動肝火血燥而生風耳非真風症也與逍遙散六味丸以清肝火滋脾血生腎水而愈一婦人患前症搔破久不愈食少體倦此肝脾虧損陰虛發熱也先用補中益氣湯加川芎炒梔元氣漸復更以逍遙散而瘡愈一婦人身如丹毒後發疙瘩搔破膿水淋漓熱渴頭暈日晡益甚先用消風散二劑又用加味逍遙散而愈一婦人患赤遊風晡熱癢甚余用清肝養血之劑不信乃服大麻風藥臂痛筋攣又服化痰順氣之劑四肢痿弱又一婦患前症數用風藥煎湯泡洗以致腹脹並歿一女子月經先期或經行上身先發赤暈微腫作癢若遇氣惱赤癢益甚服祛風之藥患處更腫砭出紫血甚多其癢愈作余謂肝火血燥風藥復傷血而為患也先用加味逍遙散清肝火益肝血赤癢少止用地黃丸滋腎水生肝木各五十餘帖而痊後因惱怒經水不止發熱作渴患處赤癢先用加味小柴胡湯二劑諸症頓止又用加味逍遙散而安一女子二十歲月經先期而或過期或有怒身發赤暈或患疙瘩六七日方退服祛風藥赤暈不退搔癢作渴執為風症恪服前藥搔破成瘡膿水津淫余曰此肝火生風再服是藥必致筋攣不悟後兩手果攣始信先用地黃丸四物湯月餘熱渴頓減乃佐以加味逍遙散又月餘患處膿少又用四君山梔牡丹皮二十餘劑指能伸屈因怒發熱經水不止睡中筋脈抽動不安以加味逍遙散加鉤藤鉤治之而痊仍用四物山梔鉤藤鉤牡丹皮而瘡結靨乃去鉤藤鉤調理元氣復而瘡靨脫一女子常患癮疹作癢因怒發熱變為疙瘩臖腫癢甚余用梔子清肝散治之而愈後又怒患痕起赤暈遊走不定自砭出紫血甚癢徹骨其熱如炙如大麻風欲用風藥余紿之曰然乃以當歸補血湯四劑其熱悉止又用聖愈湯加味逍遙散而愈一女子赤暈如霞作癢發熱用小柴胡湯加生地連翹丹皮而愈後時常發熱遍身如蟲行因惱怒起赤暈作癢用柴胡清肝散熱癢頓止用加味逍遙散熱癢全止但見風起赤暈或發癮疹或患疙瘩用胡麻散隨愈一女子常患疙瘩時或作癢服消風之類搔破成瘡其癢不止延及頭面余先用羌活當歸散其癢頓止用加味逍遙散其熱頓痊又用當歸飲而瘡亦愈用八珍柴胡山梔而不再作一小兒因有食積服克滯之劑肢體生瘡似疥服消毒之藥發疙瘩赤色作癢膿水津淫余先用五味異功散加柴胡山梔以補脾胃平肝木赤癢漸消又用四味肥兒丸五味異功散治之而食積愈一女子赤暈作癢寒熱發搐服風藥身發疙瘩搔破出水此肝血風熱之症先用加味小柴胡湯後用四味肥兒丸而愈後傷風咳嗽頭面搔癢微腫先用消風散一劑又用梔子清肝散而痊一小兒遍身生瘡小便不調頸間結核兩目連札服祛風之劑眉毛脫落余謂肝經風熱之症先用大蘆薈丸後用四味肥兒丸漸愈後因飲食停滯發熱其瘡復臖用大蕪荑湯四味肥兒丸而愈後每停食遍身發赤作癢服四味肥兒丸即愈一小兒遍身患瘡似疥作癢肌體消瘦發熱齦爛口渴飲水大便不實此肝腎之症也先用地黃丸治之又用大蕪荑湯而愈後因飲食所傷其瘡復焮先用四味肥兒丸後用大蕪荑湯而痊一小兒遍身生瘡似疥或癢或痛膿水淋漓眉毛脫落大便酸臭小便澄白余謂肝脾之症先用大蘆薈丸後用四味肥兒丸諸症漸愈又佐以五味異功散而痊一小兒遍身生瘡頭髮成穗眉毛脫落肌肉消瘦大便酸臭小便不調頸間結核肚大青筋余先用五味異功散月餘後用四味肥兒丸又用大蕪荑湯異功散而痊一小兒先陰莖作癢小便不調後遍身生瘡作癢服消風散毒之劑臖如大風之症頸間結核發熱如炙余先用柴胡梔子後用大蘆薈丸四味肥兒丸諸症稍愈又用蝦蟆丸四味肥兒丸而痊一小兒面部浮腫遍身如癬半年後變疙瘩色紫作癢敷巴豆等藥皮破出水痛癢寒熱大便堅硬脾肺脈洪數而實先用防風通聖散便利調和又用四物湯加荊防黃芩柴胡皂角刺甘草節諸症漸愈更以八珍湯加白朮荊防皂角刺五加皮而愈後但勞則上體發赤暈日晡益甚此氣血虛而有火也先用四物湯加丹皮參朮柴胡治之稍愈又用補中益氣湯加酒炒黑黃柏知母月餘痊愈後不守禁忌遍身生瘡誠如癘風大便酸臭肚大青筋頭髮成穗先用肥兒丸月餘又用大蕪荑湯數劑又用大蘆薈丸四味肥兒丸而尋愈一女子十二歲善怒遍身作癢出水用柴胡川芎山梔芍藥以清肝火用生地當歸黃芩以涼肝血用白朮茯苓甘草以健脾胃而愈半載之後遍身起赤痕或時眩暈寒熱余曰此亦肝火熾盛血得熱而妄行其夜果經至後因肝經血燥生瘡發熱作癢搔破出水眉毛脫落用大蘆薈丸四物二連湯而熱退用五味異功散四味肥兒丸而瘡愈一小兒遍身生瘡大便下血發熱作渴腹大青筋眉毛漸落余用大蘆薈丸五味異功散其瘡漸愈佐以補中益氣湯熱渴漸止又用異功散為主佐以補中益氣湯加吳茱萸所制黃連治之血止瘡愈一小兒十五歲遍身似疥非疥膿水淋漓晡熱口乾形體骨立四年矣此腎肝之症用六味丸而痊後陰莖作癢小便澄白患瘡疥如大風用大蘆薈丸四味肥兒丸諸症漸愈又用大蕪荑湯而尋愈後停食吐瀉不食發赤癗先用二陳山楂麥芽次用異功散飲食如前又用大蕪荑湯而愈一女子赤暈如霞作癢發熱用小柴胡湯加生地黃連翹丹皮而愈一女性急多怒月經先期患㾦癗色赤作癢搔破膿水不止服祛風藥其瘡益甚服花蛇酒四肢瘛瘲眉毛折脫余先用柴胡清肝散加鉤藤鉤數劑又用加味逍遙散加鉤藤鉤諸症漸愈又用易老祛風丸而愈一女子素有肝火因怒頸項結核寒熱晡熱遍身起赤暈作癢服祛風之藥搔破出水唇目搐動余以為脾經血虛內熱生風用梔子清肝散加鉤藤鉤而搐熱頓減又用當歸川芎散而諸症漸愈乃用加味逍遙散而痊一小兒患赤遊風余先用羌活白芷散二劑又用加味逍遙散而愈後傷風熱起疙瘩搔破出水或用大麻風藥十指拳攣膿水津淫余先用秦艽地黃湯手指如常又用易老祛風丸而瘡亦痊一小兒遍身搔癢或如蟲行內服胡麻散外敷解毒散患處皆潰誠如麻風之症視其唇或掣動或兩目連札此肝木乘脾土用升麻湯煎送瀉青丸而漸愈又用樺皮散而痊一小兒遍身搔癢起赤暈後膿水不止先用歸脾飲二劑又用胡麻散而愈後因驚挾食發熱起赤暈用越鞠丸一錢枳朮莪朮末各五分蔥湯調服二次又用消風散一服赤暈頓消又用越鞠丸而痊
