body:
  text: 序夫醫猶理也醫之有瘍醫猶理之有兵也善為理者正其五官齊其百司使紀綱法度各有所攝而不弛則垂拱委裘而天下可以無變不幸而一隅乘釁然後不得已而兵之故兵非理之所尚也將藉之以除亂也彼其平居無事之時而吾所以弭亂之本既已縝密完固而無所疏漏一旦有急則除之而已耳故兵雖試而國家之元氣不虧醫之為道也亦然方其病在腠理也湯液之所及也其在腸胃也湔浣之所及也若夫隆然皮膚之間甚至不可名狀者彼何為哉其能不攻刺乎其能不搏擊乎顧攻有守而後攻擊有備而後擊苟不諦其虛實不量其壯羸而動曰攻擊之吾恐病未卻而精已耗譬則忿兵數逞而國計內空疥癬之疾將不為腹心之患者幾希噫可不慎乎故明於理者可與語醫也已世之以瘍名家者多矣然孰有如我立齋先生者耶蓋先生以岐黃世業旁通諸家微詞頤旨靡不究竟其言以為不知外科者無以通經絡之原委不精內經者無以究陰陽之變合內外殊科其揆一也故其視病不問大小必以治本為第一義無急效無近期紓徐從容不勞而病自愈間出癘瘍機要一編屬其友沈生梓之以傳沈生讀之大率以己意而訂古方以醫案而驗治效以調補為守備之完策以解利為攻擊之權宜蓋不出乎廟堂之訐謨而坐得夫催陷廓清之術假令業醫者而執是焉既不病於滯而不通又不病於膚而無本奚至攻其所習而毀所不見耶噫若先生者可謂醫而通於理者矣是録也顧不可傳哉或者曰誠若所言則內外醫分門異業者非歟周官有疾醫瘍醫二職並存何也曰非是之謂也昔秦越人之為醫也聞秦貴小兒則小兒醫趙貴婦人則帶下醫周貴老人則耳目痹醫一醫而三習非其術誠奇幻理固不殊也若周官所存則以其職言耳豈知後世判為兩途絶不相通者哉古之任官居則為命卿而出則為命將夫一人也而理與兵兼焉孰謂內外醫果不相通者哉嘉靖歲甲寅中秋秀州沈啓原道卿甫著
