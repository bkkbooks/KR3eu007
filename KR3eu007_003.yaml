body:
  text: 下卷各症方藥通天再造散治癘風惡疾鬱金五錢大黃煨皂角刺炒黑各一兩白牽牛六錢半生半炒上為末每服五錢日未出時面東以無灰酒調下寶鑑醉仙散治癘風胡麻子牛蒡子枸杞子蔓荊子各炒一兩白蒺藜栝蔞根苦參防風各五錢上為末每一兩五錢入輕粉二錢拌勻每服一錢茶清調晨午各一服至五七日於牙縫中出臭涎令人如醉或下膿血病根乃去仍量人輕重虛實用病重者須先以再造散下之候元氣將復方用此藥忌一切炙爆厚味止可食淡粥時菜諸蛇以淡酒蒸熟食之可以助藥勢寶鑑換肌散治癘風久不愈或眉毛脫落鼻梁崩壞不月奏效如神白花蛇黑花蛇各三兩酒浸地龍去土當歸細辛白芷天麻蔓荊子威靈仙荊芥穗菊花苦參紫參沙參木賊草白蒺藜炒不灰木甘草天門冬去心赤芍藥九節菖蒲定風草何首烏不犯鐵胡麻子炒草烏炮去皮臍川芎蒼朮木鱉子各一兩上各另為末每服五錢溫酒調下食後酒多尤妙補氣瀉榮湯治癘風升麻連翹各五分蘇木當歸黃連黃耆全蠍地龍去土各五分生地黃荊芥各四分人參二分甘草一分半桔梗梧桐淚各一分麝香少許桃仁三個蠓蟲去翅足炒三個白蔻仁二分水蛭炒煙盡三個上先將豆蔻麝香水蛭蠓蟲各另為末和勻卻將前藥用水二鍾煎至一鍾去渣入桐淚前末再煎至七分空心熱服海藏愈風丹治癩病手足麻木眉毛脫落遍身生瘡及癘風癮疹皮膚燥癢搔破成瘡並皆主之苦參一斤取末四兩皂角一斤挫寸許無灰酒浸一宿以水一碗搗成汁去渣以砂器中文武火熬土花蛇一條去腸陰乾酒浸取淨肉曬乾為末大風症用之白花蛇烏梢蛇各一條依前酒浸取肉為末上為末入前二味和丸桐子大每服六七十丸空心通聖散送下乾物壓之日三服間日浴之汗出為度愚按前方果系癘風用之必效若肝經血熱脾經血虛腎經虛火脾肺氣虛遍身作癢搔破成瘡或內熱生風而眉鬢脫落或皮膚赤暈或搔起白屑而類癘風者服之反成癘風矣二聖散治癘瘡大黃五錢皂角刺三錢燒灰上為末每服二錢白湯調下早服樺皮散中服升麻湯下瀉青丸晚服二聖散皆為疏泄血中風熱也清胃散治熱毒在表以此發散之升麻白芷防風白芍藥乾葛甘草當歸川芎羌活麻黃紫浮萍木賊草上各等分每服五七錢水煎防風通聖散治風熱熾盛大便祕結發熱煩躁表裡俱實者防風當歸川芎芍藥大黃煨芒硝連翹薄荷麻黃桔梗石膏煨黃芩炒各一兩白朮山梔荊芥各二錢五分甘草二兩滑石三兩白芷蒺藜炒鼠黏子各五錢上為末每服三五錢白湯調下透經解攣湯治風熱筋攣骨痛穿山甲三錢炮荊芥紅花蘇木羌活當歸防風蟬殼去土天麻甘草各七分白芷一錢連翹川芎各五分上水酒各半煎服秦艽地黃湯治風熱血燥筋骨作痛秦艽生地黃當歸川芎羌活防風荊芥甘草白芷升麻白芍藥大力子蒸蔓荊子各一錢上水煎服羌活當歸散治風毒血熱頭面生瘡或赤腫或成塊或癮疹搔癢膿水淋漓羌活當歸川芎黃連酒炒鼠黏子蒸防風荊芥甘草黃芩酒浸炒連翹白芷升麻各一錢上酒拌曬乾水煎羌活白芷散治風熱血燥手掌皺裂或頭面生瘡或遍身腫塊或膿水淋漓羌活白芷軟柴胡荊芥蔓荊子防風豬牙皂角甘草黃芩黃連酒炒各一錢上水煎服四生散治腎臟風耳鳴目癢鼻赤齒浮或婦女血風瘡白附子獨活黃耆白蒺藜各等分上為末每服二錢用豬腰子劈開入藥濕紙裹煨熟細嚼鹽湯下風癬酒下為丸亦可消風散治風熱癮疹癢痛或膿水淋漓或頭皮腫癢荊芥穗甘草炙各二錢陳皮五錢人參白殭蠶炒茯苓防風芎藭蟬殼去土羌活藿香各一兩厚朴薑製五錢上每服五七錢姜水煎九味羌活湯治一切外因瘡毒羌活防風蒼朮各一錢五分川芎白芷生地黃黃芩甘草各一錢細辛五分上水煎服當歸飲治血熱癮疹癢痛或膿水淋漓發熱等症當歸白芍藥川芎生地黃防風白蒺藜荊芥各一錢五分黃耆炒甘草何首烏各一錢上水煎服升麻湯治風熱身如蟲行或唇反縱裂升麻三分茯苓人參防風犀角鎊羌活官桂各二錢上每服四錢水煎下瀉青丸樺皮散治肺風瘡疥癮疹及風刺粉刺樺皮四兩炒灰荊芥穗二兩甘草炙五錢枳殼四兩去穰燒煅有性杏仁二兩去皮尖另研上為末瓷器貯之每服四五錢水煎胡麻散治風熱癮疹搔癢或兼赤暈寒熱形病俱實者胡麻一兩二錢苦參荊芥穗何首烏不見鐵器各八錢威靈仙防風石菖蒲牛蒡子炒甘菊花蔓荊子白蒺藜炒去刺甘草炒各六錢上每服三錢酒調易老祛風丸治疥癩風瘡黃耆枳殼炒防風芍藥甘草地骨皮枸杞子熟地黃生地黃各酒拌杵膏上各另為末入二黃膏加煉蜜丸桐子大每服七八十丸白湯下白丁香散治癘風眼中生胬肉白丁香貝母上為末入乳汁調點眼內子和生眉散治癘風眉毫脫落半夏羊糞各等分上為末薑汁調塗眉稜上如不應當參類症眉脫條治之泄洗癘瘡藥何首烏荊芥防風馬鞭草蔓荊子各等分上每用十兩水一斗煎數沸無風處洗出汗解毒散治風瘡解外毒巴豆肉皮硝各一兩黃蜂窠黑狗脊各七錢白芷雄黃豬牙皂角羊蹄根輕粉蟬殼去土枯礬寒水石各五錢上為末臘豬油調搽外毒既去卻搽黃連散愚按洗藥雖能疏通腠理而損元氣解毒散雖能攻毒而傷良肉不宜多用黃連散治癘瘡清熱解毒黃連五兩五倍子一兩上為末唾津調塗之加味逍遙散治血虛有熱遍身搔癢心煩目昏怔忡頰赤口燥咽乾發熱盜汗食少嗜臥當歸炒芍藥酒炒茯苓白朮炒各一錢柴胡五分牡丹皮甘草炙山梔炒各八分上水煎服當歸補血湯治肌熱惡寒面目赤色煩渴引飲脈洪大而虛重按似無此血虛也若誤服白虎湯必死黃耆炙一兩當歸酒製二錢上水煎服補中益氣湯治中氣不足或因克伐四肢倦怠口乾發熱飲食無味或飲食勞倦頭痛煩躁惡寒自汗氣喘身熱等症人參當歸各一錢黃耆炒白朮甘草炙各一錢半陳皮炒柴胡升麻各三分上薑棗水煎空心午前服四君子湯治脾胃虛弱飲食少思大便不實等症人參白朮茯苓各二錢甘草炙一錢上薑棗水煎六君子湯治脾胃損傷飲食少思或大便不調面色痿黃等症即四君子加陳皮半夏七味白朮散治中氣虛弱津液不足口乾作渴或口舌生瘡不喜飲冷吐瀉等症人參白朮木香白茯苓甘草炙藿香各五分乾葛一錢上水煎服四物湯治血虛發熱煩躁或晡熱作渴頭目不清若因脾虛不能生血者用四君子湯當歸熟地黃各二錢芍藥炒川芎各一錢上水煎服歸脾湯治憂思傷脾內熱發熱或血妄行吐下或健忘驚悸少寐或婦女經候不準晡熱內熱或唇口遍身瘡疥等症白朮黃耆炒當歸茯神人參龍眼肉遠志酸棗仁炒各一錢木香五分甘草炙三分上薑棗水煎八珍湯治氣血俱虛惡寒發熱或煩躁作渴等症即前四君四物二方相合十全大補湯治症同上或更兼自汗盜汗體倦食少等症即八珍湯加黃耆肉桂聖愈湯治一切失血或血虛煩渴躁熱臥睡不寧或瘡症膿水出多五心煩熱作渴等症熟地黃生者自制生地黃當歸酒拌各一錢人參黃耆炒川芎各二錢上水煎服芎歸湯治失血煩熱作渴或頭痛眩暈川芎三錢當歸酒拌五錢上水煎服竹葉黃耆湯治氣血虛胃火盛而作渴淡竹葉生地黃各二錢黃耆麥門冬當歸川芎黃芩炒甘草芍藥人參半夏石膏煅各一錢上水煎服竹葉石膏湯治胃火盛而作渴淡竹葉石膏煅桔梗木通薄荷甘草各一錢上姜水煎濟生犀角地黃湯治胃火盛血熱妄行或吐衄便血形氣虛病氣實者犀角鎊生地黃赤芍藥牡丹皮各一錢上水煎傾出入犀末服若形氣病氣俱實再加黃芩黃連若因氣惱而致加山梔柴胡桃仁承氣湯治血結胸中手不可近或中焦蓄血寒熱胸滿嗽水不欲咽善忘昏迷其人如狂桃仁五分大黃一錢甘草三分肉桂五分上水煎服瀉青丸治肝經風熱頭目昏眩肌肉瞤動或牙關緊急痰涎壅盛或頸項脅肋小腹陰囊腿股作痛凡屬肝經有餘之症用之當歸川芎山梔龍膽草酒拌炒焦大黃炒羌活防風各等分上為末蜜丸桐子大每服二三十丸白湯下梔子清肝散治三焦肝膽經血虛風熱耳項胸乳等處癢痛或發熱寒晡熱自汗或唇搐動柴胡梔子牡丹皮各二錢茯苓川芎芍藥當歸牛蒡子炒各七分甘草五分上水煎服柴胡清肝散治風熱怒火或寒熱嘔吐等症柴胡山梔炒各一錢半黃芩炒人參川芎各一錢連翹桔梗各八分甘草五分上水煎服小柴胡湯治肝膽經風熱或寒熱往來或晡熱潮熱默默不欲飲食或因怒火口苦耳聾脅痛等症柴胡二錢黃芩一錢半人參半夏各一錢甘草炙五分上薑棗水煎大蘆薈丸治疳火下疳或小兒疳膨食積口鼻生瘡或牙齦蝕爛或蟲蝕肛門癢痛胡黃連蘆薈黃連炒木香白蕪荑炒青皮白雷丸鶴蝨草各一兩麝香一錢上為末蒸餅糊丸桐子大每服一錢空心米湯下加味地黃丸治腎經陰虛耳內癢痛或兩目昏花或吐痰氣喘作渴發熱小便赤澀等症乾山藥山茱萸牡丹皮澤瀉白茯苓熟地黃自制生地黃柴胡五味子各另為末等分上二地黃掐碎酒拌濕杵膏入前末和勻煉蜜丸桐子大每服百丸空心白湯下二陳湯治中脘停痰嘔吐噁心或頭目不清飲食少思陳皮茯苓半夏甘草炙各一錢上薑棗水煎連翹飲子治目惡日光或癮澀昏花不能久視迎風有淚蔓荊子甘草連翹各三錢黃耆炒柴胡黃芩酒拌各五分生地黃當歸紅葵花人參各三分升麻防風羌活各一錢上水煎服四物龍膽湯治肝紅風熱眼暴赤痛或生雲翳當歸川芎芍藥生地黃羌活防風龍膽草酒拌炒焦防己上水煎服四物二連湯治血虛五心煩熱晝則明瞭夜則發熱當歸生地黃白芍藥炒各一錢川芎七分黃連炒五分胡黃連三分上每服五錢水煎地芝丸治目能近視不能遠視此陽氣不足陰氣有餘生地黃焙乾四兩天門冬去心枳殼麩炒甘菊花各二兩上為末煉蜜丸桐子大每服百丸清茶下定志丸治目能遠視不能近視此陰氣不足陽氣有餘白茯苓人參各一兩遠志去心石菖蒲各一兩上為末煉蜜丸桐子大以硃砂為衣每服二三十丸溫酒下日三服神效黃耆湯治渾身或頭面手足麻木不仁兩目緊縮羞明畏日或視物不明黃耆二兩人參八錢甘草炙白芍藥蔓荊子各一兩陳皮五錢上每服五錢水煎臨臥熱服如麻木不止更加黃耆雖有熱症不用黃柏益氣聰明湯治脾胃傷損眼目昏暗或飲食勞役脾胃不足致內瘴耳鳴黃耆甘草炙人參各五錢升麻葛根黃柏炒各二錢芍藥一錢蔓荊子一錢七分上每服五錢水煎臨臥及五更服脾胃虛去黃柏清涼飲治實熱大便祕結或咽喉腫痛當歸赤芍藥甘草炒大黃蒸各等分上每服五錢水煎清胃散治脾胃濕唇齒作痛或齒齦潰爛或連頭面作痛或發熱惡寒或熱藥厚味所致生地黃酒拌當歸酒洗牡丹皮黃連各五分升麻一錢上水煎服如痛未止加石膏之類涼膈散治上焦實熱煩躁作渴或喉舌腫痛便溺祕赤大黃朴硝甘草梔子仁黃芩薄荷各一兩連翹四兩上每服三五錢水煎黃連解毒湯治瘡瘍焮痛煩躁飲冷脈洪數發狂言黃芩黃連黃柏山梔各炒一錢半上水煎服瀉黃散治胃經實熱嘔吐或口舌生瘡石膏煅藿香各一錢山梔一錢五分甘草五分防風七分上水煎服潤腸丸治脾胃伏火傷血或失血大腸乾燥大便不通或風熱血結便祕食少麻子桃仁去皮尖另研羌活當歸尾大黃煨皂角仁各一兩秦艽五錢上為末煉蜜或豬膽汁丸桐子大每服三五十丸食前滾湯下如燥糞在肛門之間用膽汁導之即通若因津液乾涸不通當補血氣滋腎丸治不渴而小便不利者乃膀胱經熱甚不能生水宜用此藥以滋化源肉桂三錢知母黃柏各酒炒黑二兩上為末水丸桐子大每服二百丸空心白滾湯下清肺飲治渴而小便不利乃肺經有熱絶寒水生化之源宜用此藥茯苓一錢豬苓三錢燈心一錢木通七分瞿麥五分萹蓄三分上為末作二劑水煎黃芩清肺飲治肺燥而小便不利黃芩山梔各一錢上水煎服五淋散治膀胱有熱水道不通淋澀不出或尿如豆汁或成砂石或熱拂便血赤茯苓一錢五分赤芍藥山梔各一錢當歸甘草各一錢二分上用燈心二十莖水煎清心蓮子飲治熱在血分口乾便濁夜則安靜晝則發熱或口舌咽乾或生瘡煩渴小便澀淋黃芩麥門冬地骨皮車前子炒甘草各一錢五分石蓮肉茯苓黃耆炒柴胡人參各一錢上水煎服升陽益胃湯治脾胃虛弱怠惰嗜臥或值秋令體重節痛大便不調小便頻數飲食不消灑淅惡寒悽慘不樂面色不和乃陽不升也羌活獨活防風各五錢柴胡白朮茯苓渴者不用澤瀉各三錢人參黃耆各二兩半夏甘草炒各一兩芍藥黃連炒陳皮各三錢上每服三五錢薑棗水煎若服後小便愈數而病愈加是不宜分利小便當減茯苓澤瀉生脈散治熱傷元氣肢體倦怠氣短懶言汗出不止口乾作渴等症人參五錢麥門冬二錢五味子一錢上水煎服如不應倍之清燥飲治氣血衰弱濕熱乘之遍身痠軟或濕熱行令肺金受邪腎無所養小便赤少大便不調或腰腿痠軟體重麻木或頭暈食少自汗口乾胸滿氣促懶於言語黃耆蒼朮各一錢人參白朮神麯炒陳皮各五分甘草炙黃柏炒麥門冬當歸各三分葛根澤瀉青皮各二分五味子九粒上水煎服二神丸治脾胃不足侵晨作瀉或不時去後飲食少思肌肉消瘦補骨脂四兩肉豆蔻二兩生薑四兩紅棗四十九枚上用水一盞煮薑棗至水乾取棗肉和藥末杵勻丸桐子大每服五七十丸淡鹽湯下六味丸一名地黃丸加肉桂五味名加減八味丸治腎虛發熱作渴痰咳頭暈喉燥唇裂腰腿痠軟或自汗盜汗便血諸血失音水泛為痰小便淋澀等症熟地黃自制八兩山茱萸去核乾山藥各四兩牡丹皮白茯苓澤瀉各三兩上為末地黃杵膏加煉蜜丸桐子大每服七八十丸空心食前滾湯下加減金匱腎氣丸治脾胃虛腰重腳腫小便不利或肚腹腫脹四肢浮腫或喘急痰盛已成蠱症其效如神白茯苓三兩附子五錢川牛膝肉桂車前子澤瀉山茱萸山藥牡丹皮各一兩熟地黃四兩酒拌杵膏上為末和地黃加煉蜜丸桐子大每服七八十丸空心米飲下五味異功散治脾胃虛弱飲食少思或食而難化大便不實等症人參白朮炒茯苓各二錢甘草炙陳皮各一錢上水煎服四神丸治脾胃虛弱大便不實飲食少思等症肉豆蔻五味子各二兩補骨脂四兩吳茱萸炒一兩上為末水二碗生薑八兩紅棗百枚煮熟取棗肉和末丸桐子大每服五七十丸空心食前白湯下愈風丹治諸風肢體麻木手足不隨等症天麻牛膝酒浸焙萆薢玄參各六兩杜仲七兩羌活十四兩當歸熟地黃自制生地黃各一斤獨活五兩肉桂三兩上為末煉蜜丸桐子大每服七十丸溫酒下瀉白散治肺經實熱咳嗽桑白皮地骨皮各一兩甘草五錢上為末每服三錢白湯調下半夏白朮天麻湯治寒熱所郁大便不利或嘔不食痰唾稠黏頭目眩暈喘促氣短或頭痛身重四肢逆冷半夏天麻黃耆人參蒼朮陳皮澤瀉茯苓各一錢五分白朮神麯炒各一錢大麥芽乾薑炒黑各三分黃柏酒製二分上每服五錢水煎服牛黃清心丸治諸風手足不隨痰涎壅塞言語蹇清心忡健忘或發顛狂防風白朮白芍藥羚羊角鎊麝香另研龍腦另研麥門冬去心黃芩各一兩人參神麯炒蒲黃炒各二兩甘草五兩白茯苓芎藭杏仁去皮尖柴胡桔梗各一兩二錢半雄黃另研二錢牛黃另研一兩二錢山藥白蘞乾薑各七錢五分當歸酒浸一兩半大豆黃卷阿膠肉桂各一兩七錢犀角二兩大棗一百枚蒸熟杵金箔一千三百片內四百為衣上為末和勻同棗肉加煉蜜丸龍眼大以金箔為衣每服二丸白湯化下人參理中丸治脾胃虛寒嘔吐泄瀉飲食少思等症白朮炒人參乾薑泡甘草炙各等分上為末丸桐子大每服六七十丸白湯下人參平肺散治心火克肺傳為疽痿咳嗽喘嘔痰涎壅盛胸膈痞滿咽嗌不利人參陳皮甘草炙地骨皮茯苓各一錢知母炒七分五味子杵炒四分青皮五分桑白皮炒一錢天門冬去心四分上水煎服決明夜靈散治目至夜則昏雖有燈月亦不能睹石決明夜明砂各另研二錢豬肝一兩或羯羊肝亦可上以竹刀切肝作二片鋪藥於內用線縛定砂罐內米泔水煮至半碗臨睡連肝食之人參益氣湯治暑熱傷氣肢體困倦飲食少思或發熱作渴等症黃耆八錢人參甘草各五錢炙甘草升麻柴胡各二錢白芍藥三錢五味子一百四十粒上作四劑水煎服四七湯治七情鬱結成痰或如梅核梗於喉間或中脘停痰噁心嘔逆紫蘇葉厚朴薑製茯苓各一錢半夏薑製一錢五分上薑棗水煎硫黃散治紫白癜風硫黃一兩用醋一碗煎乾再曬上為末以生薑蘸藥擦患處神效當歸膏治風瘡去腐肉生新肉其肉赤黯毒氣熾盛搽至淡赤或其毒已退收功甚速此膏生肌止痛補血續筋故與新肉相宜當歸黃蠟生地黃各一兩麻油六兩上先將當歸地黃入油煎黑去渣入蠟溶化候冷攪勻即成膏矣如用白蠟尤好砭法治風毒瘀血壅盛或色赤走徹用細瓷器擊碎取有鋒芒者一塊以箸一根劈開頭夾之用線縛定兩指輕撮箸梢令瓷芒正對患處懸一寸許再用箸一根頻擊箸頭令毒血遇刺皆出妙香散治心氣不足精神恍惚虛煩少睡盜汗等症甘草炒一錢人參桔梗各五錢遠志去心炒山藥薑汁茯神黃耆各一兩辰砂另研三錢麝香二錢木香煨二錢五分上為末每服二錢溫酒調下四味肥兒丸治小兒食積五疳或白禿體瘦肚大筋青發稀成穗或遍身瘡疥等症蕪荑炒神麯炒麥蘖炒黃連各等分上為末豬膽汁丸黍米大每服一二十丸木通煎湯下米糊丸亦可地黃清肺飲治肺肝咳嗽明阿膠一錢麵炒鼠黏子三分炒馬兜鈴甘草各五分杏仁七枚去皮尖糯米炒十粒上水煎服量兒加減蟾蜍丸治無辜疳症一服虛熱退二服煩渴止三服瀉痢愈蟾蜍一枚夏季溝渠中取腹大不跳不鳴身多癗者上取糞蛆一杓置桶中以尿浸之卻將蟾蜍跌死投與蛆食一晝夜用布袋盛蛆置急水中一宿取出瓦上焙乾為末麝香一字和勻粳米飯丸麻子大每服二三十丸米飲下甚效小柴胡湯加山梔牡丹皮名加味小柴胡湯治傷寒溫熱身熱惡風頭痛項強四肢煩疼往來寒熱嘔穢痰實中暑瘧疾並服之方見前愚按前方若肝膽經風熱肝火瘰癧寒熱往來日晡發熱潮熱身熱不欲飲食或怒火口苦耳聾咳嗽或脅痛胸滿小便不利或泄瀉吐酸苦水或肢體搐動唇目抽札並宜用之神效太乙膏治癰疽瘡毒潰爛玄參白芷當歸肉桂赤芍藥大黃生地黃各一兩上用麻油二斤入於銅鍋內煎至黑濾去渣徐入淨黃丹一斤再煎滴水中捻軟硬得中即成膏矣金華散治乾溼瘡癬黃丹一兩煅輕粉三錢黃柏黃連各一兩麝香一字另研上為末洗淨摻之乾用豬脂和傳麻油亦可方治惡癬以紫貝草根生白礬少許同擂塗患處又方剪刀草黃連苦參各五錢真輕粉二錢上為末入麻油調敷大楓子膏治一切瘡疥膿窠等瘡大楓子肉白礬枯各二兩真輕粉一兩柏油六兩上為末將柏油溶化和勻用之加味逍遙散治肝脾血虛身發赤痕或發熱胸乳腹脹或搔癢盜汗心煩體痛或頭目昏重怔忪頰赤或口燥咽乾食少嗜臥或婦女月經不調惡寒發熱等症方見前歸脾湯治憂思傷脾身發赤痕或搔破成瘡健忘怔忪驚悸少寐或心脾作痛自汗盜汗咳吐痰血或肢體作痛大便不調或婦女經候不準晡熱內熱或唇口生瘡流注等症方見前白癜方人參白朮蒼朮鹽炒防己酒拌黃柏酒拌川芎各一錢陳皮酒拌當歸茯苓木瓜柴胡梢甘草各五分上姜水煎服如三劑不退加桂少許或用湯煎小便澀倍用牛膝有熱加黃連身熱加羌活量兒大小用化䘌丸治諸疳生蟲不時啼哭嘔吐清水肚腹脹痛唇口紫黑腸頭濕䘌蕪荑青黛蘆薈蝦蟆燒灰川芎白芷胡黃連上各另為末等分豬膽浸膽成糕丸如麻子大每服二三十丸食後並臨臥杏仁湯下大肥兒丸治脾疳飲食少思肌肉消瘦肚大頸細發稀成穗項間結核發熱作渴精神倦怠便去酸臭愛食泥土或口鼻頭瘡或肚見青筋齧齒下利便白五疳即四味肥兒丸加乾蟾一兩蕪荑五錢天麻丸治肝疳眼目生翳昏花濕爛等症青黛川黃連天麻五靈脂川芎夜明砂微炒蘆薈龍膽草防風蟬蛻去足各一錢全蠍二枚焙麝香少許上為末豬膽汁浸糕丸麻子大每服二三十丸白滾湯下阿魏膏治一切痞塊不拘年月遠近甚者口齒蝕傷更服蘆薈丸羌活獨活玄參官桂赤芍藥穿山甲生地黃兩頭尖大黃白芷天麻各五錢槐柳桃枝各三錢紅花四錢木鱉子二十枚去殼亂髮如雞子大一塊洗去膩上用香油二斤四兩煎至黑色去渣入發再煎待發化盡去渣徐下黃丹一斤煎至軟硬得中方入芒硝四錢阿魏四錢蘇合油麝香沒藥各五錢調勻即成膏矣攤貼患處內服消積丸藥黃丹須真正者效凡貼膏藥先用朴硝隨患處大小鋪之約半寸厚以紙蓋之用尉斗尉良久如硝耗再加尉之尉二時許方貼膏藥若是肝積加蘆薈末同尉大防風湯治膝風腫痛不問已潰未潰附子炮去皮牛膝酒浸甘草炙各一錢人參杜仲薑製當歸酒浸羌活防風白芍藥炒黃耆各二錢川芎一錢五分熟地黃用生者蒸一日忌鐵器二錢上每服三五錢姜水煎空心服進三五劑更服六味地黃丸二三服獨活湯治鶴膝風不問腫潰疼痛及腰背四肢不仁獨活當歸白朮黃耆炒薄桂牛膝各一錢甘草炙五分上薑蔥水煎服量兒加減清熱消毒散治癰疽陽症腫痛發熱作渴黃連炒山梔連翹當歸各五分川芎芍藥炒生地黃金銀花各一錢甘草五分上水煎服神功散治瘡毒未成者用之內消加乳沒尤妙黃柏炒草烏炒血竭等分上各另為末和勻用漱口水調搽小兒丹瘤用之亦效已砭者用之作痛乳香定痛散治瘡瘍潰爛疼痛乳香沒藥各三錢滑石七錢寒水石一兩煅冰片二錢上為細末搽患處痛即止甚效抱龍丸治風痰壅盛驚搐昏睡等症雄黃辰砂各二錢天竺黃四錢麝香五分天麻六錢牛膽南星八錢上為末煎甘草膏丸皂角子大每一丸薄荷湯下解毒散治一切瘡毒風疹癢痛黃柏炒山梔等分上為末水調搽若破而膿水淋漓用當歸膏或蠋油調搽黃金散治天疱瘡止痛消毒滑石甘草等分上為末挑破去水敷之清涼解毒散治症同前或作焮痛大黃黃柏山梔寒水石煨等分上各另為末調搽當歸膏尤好製附子法附子重一兩三四錢有蓮花瓣頭底圓平者先備童便五六碗將附子先埋熱草灰中半日乘熱投童便浸五七日揭皮切四塊仍浸二三日用桑皮數重包之浸濕埋灰大半月取出切片檢視有白星者乃用瓦上炙熟至無白星為度如急用即切火上炙黃用之亦效大凡陽氣脫陷子時至午時惡寒未至亥發熱如用熱附子不應必用半生半熟更不應急用生附一二劑然後量症治之當歸川芎散治手足少陽經血虛風熱耳內癢痛或食少頭目不清日晡熱甚當歸川芎柴胡白朮芍藥各一錢山梔炒一錢二分牡丹皮茯苓各八分蔓荊子甘草各五分上水煎服
