body:
  text: 上卷內經云風氣與太陽俱入行諸脈俞散於分肉之間與衛氣相干其道不利故使肌肉潰䐜而有瘍衛氣有所凝而不行故其肉有不仁也有榮衛熱胕其氣不清故使鼻柱壞而色敗皮膚潰瘍風寒客於脈而不去名曰癘風其治法當刺肌肉骨髓以泄榮衛之沸熱靈樞經以鋭針刺腫上出惡血近代先哲云感天地肅殺惡氣所致其上體先見或多者毒在上也下體先見或多者毒在下也蓋氣受邪則上多血受邪則下多氣血俱受則上下齊見若眉毛先落者毒在肺面發紫泡者毒在肝腳底先痛或穿者毒在腎遍身如癬者毒在脾目先損者毒在心此五臟受症之重也一曰皮死麻木不仁二曰肉死針刺不痛三曰血死爛潰四曰筋死指脫五曰骨死鼻柱壞此五臟受傷之不可治也若聲啞目盲尤為難治大抵此症多有勞傷氣血腠理不密或醉後房勞沐浴或登山涉水外邪所乘衛氣相搏濕熱相火血隨火化而致故淮陽嶺南閩間多患之治當辨本症兼症變症類症陰陽虛實而治焉若妄投燥熱之類膿水淋漓則肝血愈燥風熱愈熾腎水愈傷相火愈旺反致敗症矣本症治法一癘瘍所患非止一臟然其氣血無有弗傷兼症無有弗雜況積歲而發現於外須分經絡之上下病勢之虛實不可概施攻毒之藥當先助胃壯氣使根本堅固而後治其瘡可也經云真氣奪則虛邪氣勝則實凡云病屬有餘當認為不足一癘瘍當知有變有類之不同而治法有汗有下有砭刺攻補之不一蓋兼症當審輕重變症當察後先類症當詳真偽而汗下砭刺攻補之法又當量其人之虛實究其病之源委而施治之蓋虛者形氣虛也實者病氣實而形氣則虛也一癘瘍砭刺之法子和張先生謂一汗抵千針蓋以砭血不如發汗之周遍也然發汗即出血出血即發汗二者一律若惡血凝滯在肌表經絡者宜刺宜汗取委中出血則效若惡毒蘊結於臟非蕩滌其內則不能痊若毒在外者非砭刺遍身患處及兩臂腿腕兩手足指縫各出血其毒必不能散若表裡俱受毒者非外砭內泄其毒決不能退若上體患多宜用醉仙散取其內蓄惡血於齒縫中出及刺手指縫並臂腕以去肌表毒血下體患多宜用再造散令惡血陳蟲於穀道中出仍針足指縫並腿腕隔一二日更刺之以血赤為度如有寒熱頭疼等症當大補血氣一癘瘍服輕粉之劑若腹痛去後兼有膿穢之物不可用藥止之若口舌腫痛穢水時流作渴發熱喜冷此為上焦熱毒宜用瀉黃散若寒熱往來宜用小柴胡湯加知母若口齒縫出血發熱而大便祕結此為熱毒內淫宜用黃連解毒湯若大便調和用濟生犀角地黃湯若穢水雖盡口舌不愈或發熱作渴而不飲冷此為虛熱也宜用七味白朮散一癘瘍手足或腿臂或各指拳攣者由陰火熾盛虧損氣血當用加味逍遙散加生地黃及換肌散兼服一癘瘍生蟲者五方風邪翕合相火制金木盛所化內食五臟而症見於外也宜用升麻湯送瀉青丸或樺皮散以清肺肝之邪外灸承漿以疏陽明任脈則風熱息而蟲不生矣肝經虛熱者佐以加味逍遙散六味地黃丸一癘瘍久而不愈有不慎起居飲食內火妄動者有臟腑傷損氣血疲乏者有用攻伐之物氣血愈虧者有不分兼變相雜用藥失宜者有病人諱疾忌醫者一癘瘍愈而復發有不戒厚味內熱傷脾者有不戒房勞火動傷腎者有不戒七情血氣傷損者有餘毒未盡兼症干動者有氣虛六淫外乘者古人云此症百無一生正謂此耳兼症治法一頭目眩暈若右寸關脈浮而無力脾肺氣虛也用補中益氣湯若左關尺脈數而無力肝腎氣虛也用六味地黃丸若右寸尺脈浮大或微細陽氣虛也用八味地黃丸血虛者四物湯加參苓白朮氣虛者四君子湯加當歸黃耆肝經實熱者柴胡清肝散肝經虛熱者六味地黃丸脾氣虛弱者補中益氣湯脾虛有痰者半夏白朮天麻湯砭血過多者芎歸湯發熱惡寒者聖愈湯大凡發熱則真氣傷矣不可用苦寒藥恐復傷脾胃也一口喎目斜若手足牽搐或眉稜癢動屬肝經血虛風熱用加味逍遙散六味地黃丸以生肝血滋腎水若寒熱往來或耳聾脅痛屬肝木熾盛先用小柴胡合四物湯以清肝火生肝血若筋攣骨痛或不能動履用六味地黃丸補中益氣湯以滋化源若因服燥藥而致者用四物湯加生甘草金銀花以解熱毒益陰血凡此俱屬肝經血燥所致須用六味地黃丸補中益氣湯為主若因怒氣房勞而甚者用六味地黃丸十全大補湯為主若因勞傷形體而甚者用補中益氣湯十全大補湯為主一夏秋濕熱行令若飲食不甘頭目眩暈遍身痠軟或兩腿麻木口渴自汗氣促身熱小便黃數大便稀溏濕熱傷元氣也用清燥湯如在夏令用清暑益氣湯若自汗盜汗氣高而喘身熱脈大元氣內傷也用補中益氣湯若嘔吐少食肚腹痞悶大便不實脾胃受傷也用六君子湯若胸腹不利飲食少思吐痰不止脾胃虛痞也用四君子湯若形氣倦怠肢體麻木飲食少思熱傷元氣也用人參益氣湯一熱渴便濁若夜安晝熱者熱在氣分也用清心蓮子飲晝安夜熱者熱在血分也用四物二連湯俱佐以六味地黃丸若寒熱往來者肝經血虛也用加味逍遙散六味地黃丸一小便不利若因服燥藥而致者用四物湯加炒黑黃柏知母生甘草以滋陰血若頻數而色黃者用四物湯加參朮麥門五味子以生血氣若短而色黃者用補中益氣湯加山藥麥門五味以滋化源經云無陰則陽無以生無陽則陰無以化一大便不通若血虛內熱而澀滯者用四物湯加麥門五味子以生血潤燥若因燥熱之藥而患者用四物湯加連翹生甘草以生血清熱若服克伐之藥而致者用四君子湯加芎歸以助氣生血若作渴飲冷者熱淫於內也用竹葉石膏湯以清胃火若作渴飲湯者腸胃虛熱也用竹葉黃耆湯以補氣生津若內熱作渴面赤飲湯者用四物湯送潤腸丸以涼血潤燥若腸胃滿燥燥在直腸而不通者用豬膽汁導之腸胃氣虛血涸而不通者用十全大補湯若肝膽邪盛脾土受侮而不能輸化者用小柴胡湯加山梔郁李仁枳殼治之一怔忡無寐或兼衄血便血若內熱晡熱作渴飲湯肢體倦怠此脾血虛而火動也用四君子加芎歸若思慮傷脾動火而致用歸脾湯加山梔若發熱晡熱用八珍湯加酸棗仁茯神遠志若因心血虛損用柏子仁散大抵此症皆心脾血少所致但調補胃氣則痰清而神自安不必專於清熱治痰一發熱惡寒若肢體倦怠煩躁作渴氣高而喘頭痛自汗者此內傷氣血也用補中益氣湯加五味麥門怠倦食少大便不調小便頻數灑淅惡寒者此脾肺氣虛也用升麻益胃湯煩躁作渴體倦少食或食而不化者此脾氣虛熱也用六君子湯一發熱在午前脈數而有力者氣分熱也用清心蓮子飲脈數而無力者陽氣虛也用補中益氣湯午後脈數而有力者血分熱也用四物湯加牡丹皮脈數而無力者陰血虛也用四物湯加參術熱從兩脅起者肝虛也用四物湯加參朮黃耆從臍下起者腎虛也用四物湯加參朮黃柏知母五味麥門肉桂或六味丸其熱晝見夜伏夜見晝止或去來無定時或起作無定處或從腳起者此無根虛火也須用加減八味丸及十全大補湯加麥門五味更以附子末唾津調搽湧泉穴若形體惡寒喜熱飲食者陽氣虛寒也急用八味丸一口乾若惡冷飲食者胃氣虛而不能生津液也用七味白朮散若喜冷飲食者胃火盛而消爍津液也須用竹葉石膏湯夜間發熱口渴者腎水弱而不能上潤也當用六味地黃丸若因汗下之後而有前患胃氣虛也宜用八珍湯主之一作渴若煩躁飲冷者屬上焦實熱用涼膈散兼大便祕結者屬上焦實熱用清涼飲若用克伐之藥而渴者氣血虛也急用八珍湯六味丸一耳聾耳鳴若左寸關脈弦數者心肝二經虛熱也用四物湯加山梔柴胡生陰血右寸關脈浮大者脾肺二經虛熱也用補中益氣湯加山梔桔梗培陽氣若因怒便作用小柴胡湯加山梔芎歸清肝涼血若午前甚用小柴胡湯加參耆歸術補氣清肝午後甚用四物湯加酒炒黑黃柏知母五味補陰降火如兩足心熱屬腎虛用六味丸以壯水之主兩足冷屬陽虛用八味丸以益火之源一項強口噤腰背反張者氣血虛而發痙也仲景張先生云足太陽病發汗太多則痙風病下之則痙復發汗則加拘急瘡家發汗則痙蓋風能散氣故有汗而不惡寒曰柔痙寒能澀血故無汗而惡寒曰剛痙皆因內虛復汗亡津血筋無所養而然悉屬虛象非風症也當大補氣血為主故産婦潰瘍勞傷氣血濕熱相火誤服克伐之劑者多患之其義可見近以痙為痓傳寫之誤也一婦女經閉若因鬱火傷脾以歸脾湯加山梔丹皮氣血俱虛以八珍湯加山梔丹皮若因服燥藥傷血以四物湯加生甘草若經候過期而來者氣血虛也八珍湯倍用參術先期而來者血虛熱也四物湯倍加參朮牡丹皮將來而作痛者氣虛血滯也四物湯加茯苓白朮香附色紫而成塊者血熱也四物湯加山梔丹皮作痛而色淡者血氣虛也用八珍湯其血崩之症肝火不能藏血者用加味逍遙散脾虛不能統血者用補中益氣湯凡此皆六淫七情虧損元氣所致當審其因而調補胃氣為主變症治法一身起疙瘩搔破膿水淋漓若寒熱往來者肝經氣血虛而有火也用八珍散加丹皮柴胡寒熱內熱者血氣弱而虛熱也用八珍散倍用參術若惡寒形寒者陽氣虛寒也用十全大補湯若肌膚搔如帛隔者血氣不能外榮也用人參養榮湯若面部搔之麻癢者氣血不能上榮也用補中益氣湯若痿軟筋攣者血氣不能滋養也用補中益氣湯佐以六味地黃丸一口舌生瘡或咽喉作痛若飲食喜冷大便祕結者實熱也用四順清涼飲肌熱惡熱煩渴引飲者血虛也用當歸補血湯飲食惡寒大便不實者虛熱也用十全大補湯熱從下或從足起者腎虛熱也用加減八味丸若飲食難化四肢逆冷者命門火衰也用八味地黃丸一牙齒作痛或牙齦潰爛若喜寒惡熱屬胃火加味清胃散為主惡寒喜熱屬胃虛補中益氣湯為主一自汗盜汗蓋自汗屬氣虛盜汗屬血虛自汗用補中益氣湯送六味地黃丸盜汗用當歸六黃湯內芩連黃柏炒黑用送六味地黃丸若因勞心而致以歸脾湯倍用茯神酸棗仁一唾痰或作喘若右寸脈浮緩者肺氣虛也用六君子湯加桔梗右寸脈洪滑者肺經有熱也用瀉白散右寸關脈浮緩遲弱者脾肺氣虛也用六君子湯加桔梗黃耆右寸關脈洪滑遲緩者脾熱傳肺也用瀉白瀉黃二散右尺脈微弱者命門火衰而脾肺虛也用人參理中丸如不應用八味地黃丸右寸脈洪數者心火克肺金也用人參平肺散如不應用六味地黃丸左寸關脈洪弦數者心肝二經有熱也用柴胡清肝散如不應佐以牛黃清心丸清其風熱仍用六味地黃丸以鎮陽光左尺脈數而無力者腎虛而水泛上也用六味地黃丸加五味子以滋陰如脈微細或手足冷或兼喘促急用八味地黃丸以補陽一舌赤裂或生芒刺兼作渴引飲或小便頻數不時發熱或熱無定處或足心熱起者乃腎水乾涸心火亢盛用加減八味丸主之佐以補中益氣湯若誤用寒涼之劑必變虛寒而歿一口舌生瘡作渴不止不時發熱或晝熱夜止或夜熱晝靜小便頻數其熱或從足心或從兩脅或從小腹中起外熱而無定處者此足三陰虧損之症也用加減八味丸為主佐以十全大補湯若誤用寒涼治火之劑復傷脾胃胸腹虛痞飲食少思或大便不實小便不利胸腹膨脹肢體患腫或手足俱冷者此足三陰虧損之虛寒症也急用加減金匱腎氣丸亦有復生者一肚腹腫脹若朝寬暮急屬陰虛暮寬朝急屬陽虛朝暮皆急陰陽俱虛也陽虛者朝用六君子湯夕用加減腎氣丸陰虛者朝用四物湯加參術夕用加減腎氣丸真陽虛者朝用八味地黃丸夕用補中益氣湯若肚腹痞滿肢體腫脹手足並冷飲食難化或大便泄瀉口吸氣冷者此真陽衰敗脾肺腎虛寒不能司攝而水泛行也急用加減腎氣丸否則不救也一發熱惡寒若寸口脈微名陽氣不足陰氣上入陽中則惡寒也用補中益氣湯尺部脈弱名陰氣不足陽氣下陷於陰中則發熱也用六味地黃丸若暑熱令而肢體倦怠此濕熱所乘屬形氣虛而病氣實也當專補陽氣用補中益氣湯若發熱大渴引飲目赤面紅此血虛發熱屬形病俱虛也當專補陰血用當歸補血湯一發熱作渴若右寸關脈浮大而無力者脾肺之氣虛也用補中益氣湯數而有力者脾肺之氣熱也用竹葉石膏湯寸脈微數而無力者肺氣虛熱也用竹葉黃耆湯尺脈微細或微數而無力者命門火衰也用八味地黃丸左寸關脈數而有力者心肝之氣熱也用柴胡梔子散數而無力者心肝之氣虛也用六味地黃丸尺脈數而無力者腎經虛火也用加減八味丸大凡瘡愈後口渴或先渴而患瘡或口舌生瘡或咽喉腫痛或唇裂舌黃目赤痰涎上湧者皆敗症也非此丸不能救一眼目昏弱或內障黑花屬血虛神勞用滋陰腎氣丸若視物無力或見非常之狀屬陰精虛弱用滋陰地黃丸若視物無力或視物皆大屬陽盛陰虛用六味地黃丸若目緊體倦或肌膚麻木屬脾肺氣虛用神效黃耆湯若至夜目暗燈下亦暗屬陽虛下陷用決明夜靈散若眼暗體倦內障耳鳴屬脾胃氣虛用益智聰明湯蓋五臟六腑之精氣皆稟受於脾土上貫於目脾為諸陰之首目為血脈之宗當補脾土為善一衄血吐血若左寸關脈數而無力血虛也四物加參術浮而無力氣虛也補中益氣湯尺脈數或無力腎虛也六味地黃丸右寸關脈數而有力者肺胃熱也犀角地黃湯數而無力者肺胃虛熱也先用濟生犀角地黃湯後用四物湯加參苓白朮尺脈數無力陰虛也用六味地黃丸若面黃目澀眵多手麻者脾肺虛也用黃耆芍藥湯一飲食少思若因胃氣虛而不能食用四君子湯若因脾氣虛而不能化用六君子湯大便不實或嘔吐者脾氣虛寒也用六君子湯加乾薑木香若作嘔口渴或惡冷飲食者胃氣虛熱也用五味異功散喜冷飲食胃氣實熱也用瀉黃散一帶下因經行産後外邪入胞傳於五臟而致之其色青者屬於肝用加味逍遙散加防風濕熱壅滯小便赤澀用前散加炒黑龍膽草肝血不足或燥熱風熱用六味丸逍遙散色赤者屬於心用小柴胡湯加黃連山梔當歸思慮過傷者用妙香散六味丸色白者屬於肺用六味丸補中益氣湯加山梔色黃者屬於脾用六味丸六君子湯加山梔柴胡不應用歸脾湯色黑者屬於腎用六味丸氣血俱虛用八珍湯陽氣下陷用補中益氣湯濕痰下注前湯加茯苓半夏蒼朮黃柏氣虛痰飲四七湯送六味丸若病久元氣下陷或克伐所傷但壯脾胃升陽氣為善若拘於人之肥瘦而用燥濕瀉火之藥反傷脾胃為害不淺一二便下血若右關脈浮數氣虛而熱也用四君子加升麻當歸尺脈浮大或微弱元氣下陷也用補中益氣湯左關脈洪數血虛也用四物湯加炒山梔升麻秦艽脈遲緩或浮大氣虛也用四君子湯加升麻炮薑尺脈洪數或無力者腎虛也用六味地黃丸若因房勞傷損精氣陰虛火動而小便下血諸血病者不問脈症百端但用前丸料煎服為善一泄瀉在五更或侵晨乃脾腎虛五更服四神丸日間服白朮散或不應或愈而復作急用八味丸補命門火以生脾土其瀉自止一大便不通屬脾肺虧損大腸津液乾涸或血虛火鑠不可計其日期飲食數多必待腹滿脹自欲去而不能乃熱在直腸間也用豬膽汁潤之若妄服苦寒辛散之劑元氣愈傷或通而不止或成中痞之症若氣血虛者用八珍湯加麻子仁腸胃虛者用補中益氣湯加麻子仁腎液不能滋潤用六味地黃丸加麻子仁若厚味積壅小便淋祕者肝腎虛也用六味地黃丸以滋腎水用補中益氣湯以補脾胃若發熱晡熱用六君子湯加味逍遙散養陰血清風熱若兼筋骨痛先用透經解攣湯秦艽地黃湯後用八珍散加牡丹皮柴胡主之若誤服風劑而傷陰血者用易老祛風丸若兩股或陰囊或兩足必用四生散地黃丸為善若誤服草烏川烏之類或敷巴豆砒石等味肌肉腐潰反成癘症治者審之一面赤搔癢或眉毛脫落屬肺經風熱用人參消風散樺皮散氣虛用補中益氣湯加天麻殭蠶血虛用加味逍遙散加鉤藤鉤面發紫泡或成塊或眉毛脫落屬肝經風熱先用小柴胡湯加山梔丹皮鉤藤鉤後用加味逍遙散凡症屬肝經血燥生風但宜滋腎水生肝血則火自息風自定癢自止矣一遍身疙瘩或癮疹搔癢此風熱傷血用羌活當歸散氣虛者佐以補中益氣湯加山梔鉤藤鉤血虛者佐以加味逍遙散加鉤藤鉤若手足皴裂不問黯白或在手足腿腕搔起白皮此風熱而祕澀用清胃散加芍藥蓋腎開竅於二陰精血不足則大便祕塞而不通矣須用六味地黃丸補中益氣湯以滋化源一小便不利若不渴而不利者熱在下焦血分也用滋腎丸渴而不利者熱在上焦氣分也用清肺散腎經陰虛而不利者用六味地黃丸熱結膀胱而不利者用五淋散元氣虛而不能輸化者用補中益氣湯脾肺之氣燥而不能化生者用黃芩清肺飲若轉筋便閉氣喘不問男女孕婦急用八味丸緩則不救一白濁足三陰經主之屬厚味濕熱所致者用加味清胃散肝腎虛熱者用六味地黃丸為主佐以逍遙散脾腎虛者用六味丸佐以六君子湯肝脾鬱滯者六味丸佐以歸脾湯肺脾氣虛者六味丸佐以補中益氣湯濕痰下注者益氣湯佐以六味丸癘瘍類症類症者與癘形狀相似而所因不同也一兩臁如癬搔癢久則膿水淋漓或搔起白皮者名腎臟風也用四生散以祛風邪用六味地黃丸以補腎水若頭目不清內熱口乾體倦痰熱血燥秋間益甚故俗名雁來風宜用羌活白芷散加味逍遙散氣虛者佐以補中益氣湯加皂角刺鉤藤鉤血虛者佐以八物湯加柴胡牡丹皮或加味逍遙散兼服一肢體或腿臂腕間患㾦癗而遊走不定者赤曰赤遊風白曰白遊風為血虛陰火內動外邪所搏之症白用人參消風散赤用加味逍遙散氣血俱虛用八珍湯晡熱內熱用加味逍遙散六味地黃丸一遍身或頭面起疙瘩或如霞片或破而膿水淋漓或癢痛寒熱乃肝火血虛也用加味逍遙散若口苦脅痛小便淋瀝肝火血熱也用柴胡清肝散若婦女夜間譫語發熱熱入血室也用小柴胡湯加山梔生地黃血虛者四物合小柴胡湯病退卻用逍遙散以健脾胃生陰血此症多有因怒氣而發者治當審之一婦人肢體癮疹疙瘩搔破成瘡膿水淋漓熱渴眩暈日晡益甚者用四物湯加柴胡山梔丹皮清肝火補肝血若煩熱體倦頭目不清用八珍散加丹皮山梔補脾氣生陰血若自汗盜汗月水不調肚腹作痛用八珍湯六味丸若食少體倦心忪盜汗經閉寒熱用八珍湯佐以加味逍遙散若病久元氣怯弱用十全大補湯佐以歸脾湯一女子十三四或十六七而天癸未至或婦人月經不調發赤癍癢痛此屬肝火血熱用小柴胡湯加山梔生地黃牡丹皮防風一生蟲者乃相火制金不能平木而化耳非風邪所生也但滋腎水生肝血或佐以灸承漿之類説見本症一敷砒霜患處作痛或腐潰用濕泥頻塗換之若毒入腹胸膈苦楚或作吐瀉飲冷米醋一二杯即止多亦無妨生緑豆末芝麻油俱可一敷貼雄黃藥悶亂或吐瀉用防己煎湯解之一服辛熱藥而眉發脫落者乃肝經血傷而火動非風也用四物湯六味丸以滋肝血生腎水一服川烏草烏等藥悶亂流涎或昏憒嘔吐或出血吐血用大豆遠志防風甘草任用一味煎湯解之大凡服風藥過多皆宜用之未應急用甘草生薑汁解一敷貼巴豆之藥患處作痛肌肉潰爛以生黃連為末水調敷之若毒入肉吐瀉等症更以水調服一二錢大小豆菖蒲汁俱可一敷貼藜蘆毒入內煎蔥湯解之一服祛風克伐之藥嘔吐少食胸膈不利或形氣倦怠等症用六君子湯以補陽氣若煩躁作渴飲食不思或晡熱內熱面赤發熱用四物湯加參術以生陰血余從各門治之本症治驗一男子冬間口苦耳鳴陰囊濕癢來春面發紫塊微腫麻木至冬遍身色紫不知痛癢至春紫處俱大至夏漸潰又至春眉落指潰此患在肝膽二經令刺手指縫並臂腿腕出黑血先與再造散二服下毒穢更以小柴胡合四物湯加白芷防風天麻皂角刺漸愈又與換肌散但遍體微赤此血虛有火因家貧未得調理秋間發熱至春面仍發塊用前散並養血藥喜年少謹疾得愈一膏粱之人鼻壞眉落指脫體潰熱渴晡甚用四物湯加酒炒黑黃柏知母五味麥門白芷天麻皂角刺三十餘劑熱渴少止時仲夏精神倦怠氣喘身熱小便黃數大便稀溏此元氣虛而時熱勝也用補中益氣湯頓安乃與換肌散及益氣湯兼服兩月更以生脈散代茶飲瘡少退時至仲秋眩暈少食自汗體重大便溏數此亦時濕之症用清燥湯調理而愈又用補中益氣湯少加酒炒黑黃柏知母皂角刺天麻兩月餘而瘥又因勞倦耳聵熱渴誤服祛風藥病氣益劇身發赤疹與益氣聰明湯月許而愈一男子赤痛熱渴膿水淋漓心煩掌熱目昧語澀怔忡不寧此心經受症也用安神丸兼八珍湯少加木通炒黑黃連遠志元氣漸復卻行砭刺外邪漸退但便燥作渴用柴胡飲並八珍湯而愈再用換肌散而瘥一男子肚見青筋面起紫泡發熱作渴寅卯時甚脈弦數腿轉筋小便澀此肝經火症先用柴胡飲熱退便利卻用小柴胡合四物湯加龍膽草炒山梔三十餘劑及八珍湯加柴胡山梔養其氣血乃用換肌散去其內毒而安年餘因勞役飲食失宜寒熱頭痛遍身赤疹自用醉仙散而歿一男子面發紫疙瘩膿水淋漓睡中搐搦遍身麻木漸發赤塊勞怒則癢肝脈洪大砭刺臂腿腕各出血用清胃湯加大黃皂角刺四劑煎下瀉青丸肝木少退以升麻湯數劑下前丸諸症少愈卻用寶鑑換肌散斤許又用小柴胡合四物湯加參朮天麻角刺百餘劑及六味地黃丸半載而愈後因勞遍身麻癢脈微而遲此氣血俱虛不能榮於腠理用十全大補湯加五味麥門調理年餘而安一男子面赤發紫泡下體癢痛午後發熱大便燥黑此火盛而血虛也用再造散及四物湯加防己膽草及刺腿指縫出毒血而便和仍以前藥加白朮白芷茯苓羌活獨活而便黃仍以四物去膽草防己少用獨活加玄參萆薢五十餘劑而瘡退卻用補中益氣湯加天麻麥門而氣血漸充時仲秋霪雨遍身痠痛用清燥湯而安隨用換肌散胡麻散八珍湯兼服而愈一上舍面發腫肌如癬後變疙瘩色紫搔之出水此脾肺之症也先用清胃湯以清胃熱解表毒又用四物湯加山梔黃芩柴胡皂角刺甘草節以養陰血祛風熱及砭臂腿腕手足指縫並患處以去毒血疏通隧道乃與八珍湯加白芷皂角刺五加皮全蠍及二聖散兼服月餘以養陰血治瘡毒又與補氣瀉榮湯少愈再與換肌散而全愈後因勞倦遂發赤暈日晡尤甚以四物湯加丹皮柴胡山梔並用補中益氣湯年餘雖勞而不發一男子遍身如癬搔癢成瘡色紫麻木掐之則痛小便數而少此脾胃受症邪多在表用清胃散更砭刺患處並臂腕腕出黑血神思漸爽但惡寒體倦口乾此邪氣去而真氣虛也以大劑參耆芎歸蒺藜桔梗數劑元氣頓復卻用八珍湯加黃耆白芷蒺藜天麻軟柴胡及二聖散治之其瘡漸愈後用換肌散八珍湯等藥調理半載而痊後仍發誤用克伐攻毒患兩感傷寒而死一男子遍身疙瘩搔則癢掐則痛便閉作渴此邪在內也治以再造散二服微下三次用桃仁承氣湯加當歸四劑及砭出黑血漸知痛癢但形體倦怠用培養之劑復其元氣又用二聖散其瘡頓愈更用大補年餘而康後患痰涎壅盛舌強語澀用二陳蒼朮黃柏知母澤瀉四劑而愈再用補中益氣湯調理而安一男子素清苦眉盡落病在肝膽二經也乃刺臂腿腕及患處出黑血空心服八珍湯加五味胡麻首烏威靈食後服換肌散喜其無兼變之症又能篤守禁忌不半年而痊一儒者腳心或癢痛或麻癢或腫脹二年後身體作癢漸變疙瘩發熱耳鳴日晡益甚此屬腎虛也乃砭刺臂腕腿及手足指縫去其瘀血用六味地黃丸料加五味柴胡五十餘劑以補腎又用換肌散祛風丸以治瘡各斤許瘡漸愈得滋補守禁而痊一上舍遍身患之形體俱虛余謂須用調補元氣完復方治其瘡不信恪服蛇酒以攻內毒外敷砒霜等藥以蝕外毒頓加嘔吐清水體痛如錐或以為毒氣外發余曰脾主肌肉此因毒藥脾傷而然也反服祛毒之劑吐瀉不止而歿一男子用藥湯熏洗汗出不止喘嗽不食腹鳴足冷肢體抽搐余謂此因熱傷元氣腠理不密汗出亡陽耳是日果卒類症治驗欽天薛天契年逾六旬兩臁膿水淋漓發熱吐痰數年不愈屬腎臟風症用四生散而瘥年餘復作延及遍體日晡益甚痰渴盜汗唇舌生瘡兩目皆赤此腎經虛火用加減八味丸諸症悉愈三年後小便淋瀝莖道澀痛此陰已痿思色而精內敗也用前丸及補中益氣湯加麥門五味而愈翟鴻臚兩臁生瘡漸至遍身各大寸許腫而色黯時出血水吐痰咽乾盜汗心煩溺赤足熱日晡益甚形體消瘦左尺脈洪數無力余以為腎經虛火用六味丸不月諸症悉退三月元氣頓復松江掌教翟立之素善飲遍身疙瘩搔起白屑上體為甚面目焮腫成瘡結痂承漿潰膿眼赤出淚左關脈洪數有力或作癘風治之膿潰淋漓余謂肝火濕毒以四物湯加乾葛連翹山梔柴胡芩連一劑諸症悉退四劑全退兩睛各顯青白翳一片亦屬肝火再劑翳去乃用六味丸而愈一儒者身發疙瘩時起赤暈憎寒發熱服癘風之藥眉落筋攣後疙瘩漸潰日晡熱甚肝脈弦洪餘脈數而無力此肝經血虛風熱也先以小柴胡合四物湯加牡丹皮酒炒黑黃柏知母肝脈漸和晡熱漸退又用八珍湯加山梔寒熱頓去再與加味逍遙散加參朮鉤藤鉤木賊服兩月瘡悉愈而眉漸生後因怒復作用小柴胡湯加芎歸鉤藤鉤木賊而愈後勞役發熱誤用寒劑不時身癢日晡亦暈早與補中益氣湯加五味麥門山藥午後與加減八味丸尋愈後食炙爆等物痰盛作渴仍發疙瘩小便白濁右關脈滑大有力用補中益氣湯加山梔諸症悉退一男子愈後肌膚作癢口乾飲湯此中氣虛不能化生津液榮養肌膚午前服七味白朮散補中益氣湯午後服參耆芎歸五味麥門少愈又用十全大補湯加五味麥門全愈一男子愈後因勞惡寒頭痛體倦余謂惡寒乃胃氣虛不能護衛肌表頭痛乃清氣虛不能上升巔頂用補中益氣湯加五味麥冬益甚更兼口噤脈微細如無又加附子五分四劑而瘥一男子愈後每早吐痰碗許形體倦怠此中虛氣而不能克化飲食以參耆白朮陳皮半夏曲為丸臨臥服早間服補中益氣湯不月而愈蓋胃為五穀之海脾為消化之器若脾氣健旺運行不息痰自無矣一男子愈後惡寒頭暈食少體倦屬中氣虛弱用補中益氣湯加蔓荊子並十全大補湯加五味子血氣充而愈一男子面起赤暈時或發腫擘手亦然搔起白屑服癘風藥內熱體倦脈大而虛此因元氣虛而陰血復傷用六味地黃丸補中益氣湯而尋愈一男子兩目俱赤遍身癢痛搔起白皮此肝肺陰虛誤服祛風燥劑鼻赤面紫身發疙瘩搔出血水用升麻湯下瀉青丸數服又用加味逍遙散數劑身鼻漸白疙瘩漸消又用四物湯加參耆柴胡山梔並換肌散各百餘服喜其年少謹疾痊愈一男子愈後寒熱往來體瘦倦怠飲食不甘此因元氣虛而變症也午前用補中益氣湯加麥門五味午後用四物湯加麥門五味而愈一男子遍身搔癢後成瘡出水灑淅惡寒皮膚皺起眉毛漸落大便祕結小便赤少此屬肺火為患用補氣瀉榮湯四劑諸症漸退但倦怠惡寒小便清少此邪氣去而真氣虛也用補中益氣湯兼換肌散半載乃元氣復而諸症退時仲秋忽大便不實小便頻數體倦食少灑淅體重此濕邪乘虛而作用東垣益胃湯二劑頓安仍用前藥調理三月餘全愈一儒者遍身作癢搔破膿水淋漓眉毛脫落如癘風症久服祛風等藥致元氣虧損余用補中益氣湯加茯苓而愈後失調理日晡熱甚用八珍湯加五味麥門五十餘劑而愈一儒者懷抱久郁先四肢如癘恪祛風消毒氣血愈虛延及遍身寒熱作渴肢體倦怠脈洪大而虛謂余何也余曰始因脾鬱血虛陰火妄動後因藥傷脾胃元氣下陷遂用補中益氣湯培補脾胃升舉元氣用歸脾湯解散鬱火生髮脾血更以六味丸益腎肝精血引虛火歸源不兩月諸病悉愈一男子遍身生瘡膿水淋漓晡熱口乾兩足發熱形體消瘦雜服風瘡藥六年未愈尺脈洪數而無力此腎經瘡也如小兒腎疳之症用加減八味丸不半載而痊一男子遍身生瘡似疥非疥膿水淋漓兩腿為甚作癢煩熱肢體倦怠年餘不愈余以為腎經虛火用加減八味丸而瘥一男子秋間發疙瘩兩月餘漸高有赤暈月餘出黑血此風熱血虛所致先用九味羌活湯風熱將愈再用補中益氣湯而愈後不慎房欲復作盜汗晡熱口乾吐痰體倦懶言用補中益氣湯加減八味丸頓愈一男子兩掌每至秋皮厚皺裂起白屑內熱體倦此肝脾血燥故秋金用事之時而作用加味逍遙散加川芎熟地三十餘劑而愈再用六味丸加五味麥門服之半載後手足指縫臂腿腕皮厚色白搔之則木久服前藥方愈一男子因大怒發熱眉發頓落蓋發屬腎而眉屬肝此肝腎素虛為怒陰火愈盛銷鑠精血而然也用六味丸料加柴胡山梔黃柏數劑漸生又二十餘劑而完一男子遍身搔癢服祛風辛燥之劑眉發脫落余謂前藥復傷肝腎精血虛而火內熾所致朝用八珍湯加麥門冬五味子夕用六味丸料加當歸黃耆治之風熱退而眉發生矣一男子染時瘡服換肌散之類眉毛頓脫遍身作癢或時赤暈乃燥藥損其陰血陽氣偏旺而然耳朝用四物湯倍熟地加茯苓白朮牡丹皮山梔生甘草夕用六味丸料加當歸黃耆治之瘡症既愈眉毫亦生一男子素不慎房勞其發忽落或發熱惡寒或吐痰頭暈或口乾作渴或小便如淋兩足發熱或冷至脛屬足三陰虧損而陰火內熾朝用十全大補湯夕用六味丸料加炒黑黃柏枸杞子治之諸症退而發漸生一男子素膏粱醇酒患腎臟風延及遍身服癘藥益甚又用捻藥於被中熏之嘔吐腹脹遍身浮腫潰爛膿水淋漓如無皮而死一男子足三陰虛患血風瘡症誤服祛風散毒之劑外敷斑蝥巴豆等類肌肉潰爛嘔吐腹膨或泄瀉足冷或煩熱作渴此藥復傷脾胃虛敗也辭不治不越月而歿一婦人膿水淋漓發熱作渴體倦惡寒經水不調久而不愈此肝脾虧損而虛熱也先用補中益氣湯加川芎炒山梔元氣漸復更以逍遙散而瘡漸愈一婦人性急善怒月經不調內熱口苦患時瘡服敗毒之藥膿水淋漓熱渴頭眩日晡益甚用加味逍遙散服之漸愈因大怒月經如湧眼赤出淚用四物湯加山梔柴胡連芩數劑而愈年餘手足臂腕起白點漸大搔起白屑內熱盜汗月經兩月餘一至每怒或惡寒頭痛或不食作嘔或胸乳作脹或腹內作痛或小便見血或小水不利或白帶下注此皆肝木製伏脾土元氣虛而變症也用補中益氣湯加炒黑山梔及加味歸脾湯間服半年而愈一婦人久郁患在四肢腿腕尤甚誤用敗毒寒涼之劑晡熱內熱自汗盜汗月經不行口乾咽燥此鬱火傷脾也用歸脾湯數劑後兼服逍遙散五十餘劑而愈一婦人身如丹毒搔破如癘熱渴頭暈日晡益甚此屬肝經風熱血燥用加味逍遙散而愈一婦人素晡熱月經不調先手心赤癢至秋兩掌皮厚皺裂時起白皮此皆肝脾血燥用加味逍遙散加荊芥鉤藤鉤川芎熟地五十餘劑又用歸脾湯二十餘劑乃服六味丸而不再發一婦人兩腿腕紫黯寸許搔破出水或用祛風砭血年餘漸胤如掌許乃服草烏等藥遍年搔癢時出血水內熱體倦飲食無味月經三月一至脈洪而數按之則澀此燥劑愈傷脾血也先以補中益氣湯加芍藥川芎五味十餘劑乃與加味逍遙散加熟地鉤藤鉤二十餘劑再用歸脾湯加川芎熟地黃治之而不發一婦人日晡身癢內外用追毒祛風之劑膿水淋漓午前畏寒午後發熱殊類癘風用補中益氣湯加山梔鉤藤鉤又以加味逍遙散加川芎而愈一婦人手心色赤搔癢發熱頭暈作渴晡甚服祛風清熱之藥膚見赤痕月經過期用加味逍遙散倍熟地熱止癢退更以四物湯加柴胡參耆炙甘草茯苓頭清渴止再用四物湯加參朮茯苓山梔赤暈亦消一婦人素清苦四肢似癬疥作癢出水怒起赤暈服祛風敗毒等劑赤暈成瘡膿水淋漓晡熱內熱自汗盜汗月經不行口乾咽燥此郁傷脾血也用歸脾湯逍遙散兩月而痊一婦人遍身疙瘩搔癢敷追毒之藥成瘡出水寒熱脅痛小便不利月經不調服祛風之劑形體消瘦飲食少思此肝火血燥生風前藥益傷脾血耳先用歸脾湯二十餘劑又用加味逍遙散二十餘劑諸症漸愈乃用六味丸調理而瘥此等症候服風藥而死者多矣一婦人愈後唇腫皺裂食少肌瘦晡熱益甚月水過期半年漸閉時發渴躁專於通經降火發渴愈甚唇脹出血此脾經虛熱而血愈耗也治以四物湯加參苓耆朮升麻丹皮柴胡山梔外症漸愈又用八珍湯加丹皮柴胡五十餘劑月水調而諸症痊一小兒面部浮腫遍身如癬半年後變疙瘩色紫作癢敷巴豆等藥皮破出水痛癢寒熱大便堅硬脾肺脈洪數而實先用防風通聖散以解表裡便利調和又用四物湯加荊防黃芩柴胡皂角刺甘草節以涼血祛毒諸症漸退更以八珍湯加白朮荊防角刺五加皮而愈後但勞則上體發赤暈日晡益甚此屬氣血虛而有火用四物湯加丹皮參朮柴胡治之稍退又用補中益氣湯加酒炒黑黃柏知母月餘痊愈一小兒遍身患疥如癘或癢或痛肢體消瘦日夜發熱口乾作渴大便不實年餘矣此肝脾食積鬱火用蘆薈丸不月而愈一女子十三歲善怒遍身作癢出水用柴胡川芎山梔芍藥以清肝火用生地當歸黃芩以清肝血用白朮茯苓甘草以健脾胃而愈半載後遍身起赤痕或時眩暈寒熱余曰此亦肝火熾甚血得熱而妄行其夜果經至一女子赤暈如霞作癢發熱用小柴胡湯加生地連翹丹皮而愈大凡女子天癸未至婦人月經不調被驚著惱多有此症一小兒十五歲遍身似疥非疥膿水淋漓晡熱口乾形體骨立四年矣此腎疳之症用加減八味丸而痊韓氏子年十四早喪天真面紅腫如風狀不時舉作或誤用癘風藥內虛發熱口燥煩渴甲辰冬邀治因請教焉先生云此內傷不足陰火上炎而類赤遊風症也藥宜滋其陰則火自降補其本則標自退大經領教用四君加參耆四十劑又用此作丸服斤許不兩月而平復若從有餘治之則誤謬多矣謹録呈上乞附藥案以惠後之患者嘉靖丁未仲春門人朱大經頓首拜書
